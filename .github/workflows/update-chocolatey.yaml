name: Update Chocolatey Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Tag (e.g. v1.2.3).'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  update-chocolatey:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Resolve Version
        id: resolve
        run: |
          if [ -z "${{ github.event.inputs.version }}" ]; then
            echo "Fetching latest from octelium repo..."
            TAG=$(curl -fsSL https://raw.githubusercontent.com/octelium/octelium/refs/heads/main/unsorted/latest_release | tr -d '[:space:]')
          else
            TAG="${{ github.event.inputs.version }}"
          fi
          
          if [ -z "$TAG" ]; then echo "Error: Failed to resolve tag."; exit 1; fi
          
          CLEAN_VERSION=${TAG#v}
          
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "CLEAN_VERSION=$CLEAN_VERSION" >> $GITHUB_ENV

      - name: Download Checksums
        run: |
          CHECKSUM_URL="https://github.com/octelium/octelium/releases/download/${TAG}/SHA256SUMS"
          curl -fsSL "$CHECKSUM_URL" -o SHA256SUMS
          if [ ! -s SHA256SUMS ]; then echo "Error: Checksums missing!"; exit 1; fi

      - name: Generate Package Files from Templates
        run: |
          VARS_TO_SUBST='$TAG $CLEAN_VERSION'
          
          for BIN in octelium octeliumctl octops; do
            for ARCH in amd64 arm64; do
              VAR_NAME="SHA_${BIN}_MSI_${ARCH}"
              VAR_NAME=$(echo "$VAR_NAME" | tr '[:lower:]' '[:upper:]')
              VARS_TO_SUBST="$VARS_TO_SUBST \$$VAR_NAME"
              
              FILE_NAME="${BIN}-${CLEAN_VERSION}-${ARCH}.msi"
              
              SHA=$(grep -E "(^|[[:space:]])${FILE_NAME}($|[[:space:]])" SHA256SUMS | awk '{print $1}' || true)
              
              if [ -z "$SHA" ]; then echo "Error: No checksum for $FILE_NAME"; exit 1; fi
              export $VAR_NAME="$SHA"
            done
          done

          envsubst "$VARS_TO_SUBST" < octelium/octelium.nuspec.tmpl > octelium/octelium.nuspec
          envsubst "$VARS_TO_SUBST" < octelium/tools/chocolateyInstall.ps1.tmpl > octelium/tools/chocolateyInstall.ps1

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add octelium/octelium.nuspec octelium/tools/chocolateyInstall.ps1
          
          if git diff --staged --quiet; then
            echo "Chocolatey package is already up to date."
          else
            git commit -m "Update Chocolatey package to ${TAG}"
            git push
          fi