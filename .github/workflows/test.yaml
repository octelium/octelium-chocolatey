name: Test Chocolatey Package

on:
  workflow_dispatch:

jobs:
  test-choco:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Pack and Install
        working-directory: ./octelium
        run: |
          choco pack octelium.nuspec
          choco install octelium -s "." -y

      - name: Verify Installation
        run: |
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          
          Write-Output "Testing binaries..."
          octelium version
          octeliumctl version
          octops version

          $RealExePath = (Get-Command octelium.exe -All | Where-Object { $_.Source -notlike "*Chocolatey\bin*" } | Select-Object -First 1).Source
          
          if ($null -eq $RealExePath) {
              $RealExePath = "C:\Program Files\Octelium\octelium.exe"
          }

          $InstallDir = Split-Path $RealExePath -Parent
          Write-Output "Checking for DLL in: $InstallDir"

          if (Test-Path "$InstallDir\wireguard.dll") {
              Write-Output "Verified: wireguard.dll exists in $InstallDir"
          } else {
              throw "Error: wireguard.dll not found in $InstallDir. Looked at $RealExePath"
          }

      - name: Test Uninstallation
        run: |
          choco uninstall octelium -y
          
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          if (Get-Command octelium.exe -ErrorAction SilentlyContinue) {
              throw "Error: octelium shim still exists in PATH!"
          }

          if (Test-Path "$env:INSTALL_DIR\octelium.exe") {
              throw "Error: octelium.exe still exists in $env:INSTALL_DIR after uninstall!"
          }
          
          Write-Output "Uninstallation successful: Binaries and Shims removed."